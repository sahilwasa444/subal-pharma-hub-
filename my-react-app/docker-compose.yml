services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      # Force the backend to use the compose Redis service instead of localhost.
      REDIS_URL: redis://redis:6379
      RAG_SERVICE_URL: http://rag-service:8000
    depends_on:
      redis:
        condition: service_healthy
      rag-service:
        condition: service_healthy

  rag-service:
    build:
      context: ../rag-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5000/api
    ports:
      - "5173:80"
    depends_on:
      - backend
